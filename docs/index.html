<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academic Check</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
    overflow:hidden;
}

.background{
    position:absolute;
    width:100%;
    height:100%;
}

.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(5px);
}

.circle:nth-child(1){
    width:300px;
    height:300px;
    top:-100px;
    left:-100px;
}

.circle:nth-child(2){
    width:250px;
    height:250px;
    bottom:-80px;
    right:-80px;
}

.card{
    position:relative;
    z-index:10;
    width:90%;
    max-width:500px;
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.2);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:40px;
    text-align:center;
    color:white;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
}

.logo{
    width:100px;
    height:100px;
    margin:auto;
    margin-bottom:20px;
    border-radius:20px;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
}

h1{
    font-size:2.5rem;
    margin-bottom:10px;
}

.subtitle{
    color:#dbeafe;
    margin-bottom:25px;
}

.description{
    line-height:1.7;
    margin-bottom:35px;
    color:#e5e7eb;
}

.download-btn{
    display:inline-block;
    text-decoration:none;
    color:white;
    background:linear-gradient(45deg,#22c55e,#16a34a);
    padding:16px 40px;
    border-radius:50px;
    font-size:18px;
    font-weight:600;
    transition:.3s;
    box-shadow:0 10px 25px rgba(34,197,94,.4);
}

.download-btn:hover{
    transform:translateY(-4px) scale(1.05);
}

.version{
    margin-top:25px;
    font-size:14px;
    color:#cbd5e1;
}

.footer{
    margin-top:15px;
    font-size:12px;
    color:#94a3b8;
}
</style>
</head>

<body>

<div class="background">
    <div class="circle"></div>
    <div class="circle"></div>
</div>

<div class="card">

    <div class="logo">🎓</div>

    <h1>Academic Check</h1>

    <p class="subtitle">
        Sistema Inteligente de Gestión Académica
    </p>

    <p class="description">
        Descarga la última versión de Academic Check para Android.
        Gestiona tus actividades académicas de forma rápida,
        moderna y segura desde cualquier lugar.
    </p>

    <a class="download-btn"
       href="https://github.com/Alice-Nicole/academic-check/releases/latest/download/app-release.apk">
       📥 Descargar APK
    </a>

    <div class="version">
        Última versión disponible
    </div>

    <div class="footer">
        © 2026 Academic Check
    </div>

</div>

</body>
</html>
